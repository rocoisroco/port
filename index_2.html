<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmashBerry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Fredoka', sans-serif; user-select: none; }
  canvas { display: block; cursor: none; }
  video { display: none; }
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10; pointer-events: none;
  }
  #overlay.active { pointer-events: all; background: rgba(0,0,0,0.75); }
  #startScreen, #gameOverScreen {
    display: none; flex-direction: column; align-items: center;
    text-align: center; color: #fff;
  }
  #startScreen.visible, #gameOverScreen.visible { display: flex; }
  .logo-img { max-width: min(500px, 85vw); height: auto; margin-bottom: 0.8rem;
    filter: drop-shadow(0 0 30px rgba(255,100,50,0.5)); }
  .logo-text { font-family: 'Luckiest Guy', cursive; font-size: 3.5rem; margin-bottom: 0.3rem;
    text-shadow: 0 0 40px rgba(255,100,50,0.6); line-height: 1.2; }
  .subtitle { font-size: 1.15rem; color: #aaa; margin-bottom: 2.2rem; }
  .btn {
    padding: 16px 52px; font-size: 1.4rem; border: none; border-radius: 50px;
    background: linear-gradient(135deg, #ff4444, #ff8800); color: #fff;
    cursor: pointer; font-family: 'Fredoka', sans-serif; font-weight: 600; letter-spacing: 1px;
    box-shadow: 0 4px 25px rgba(255,68,68,0.5); transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover { transform: scale(1.08); box-shadow: 0 6px 35px rgba(255,68,68,0.7); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  #finalScore { font-size: 3.5rem; font-weight: bold; color: #ffcc00; margin: 0.8rem 0;
    text-shadow: 0 0 20px rgba(255,200,0,0.5); }
  #finalLabel { font-size: 1.2rem; color: #aaa; }
  .stats { display: flex; gap: 2.5rem; margin: 1rem 0 2rem; }
  .stat { text-align: center; }
  .stat-val { font-size: 1.6rem; font-weight: bold; color: #fff; }
  .stat-lbl { font-size: 0.8rem; color: #888; margin-top: 2px; }
  .hint { color: #555; margin-top: 1.2rem; font-size: 0.85rem; }
</style>
</head>
<body>
<video id="webcam" autoplay playsinline></video>
<canvas id="gameCanvas"></canvas>
<div id="overlay" class="active">
  <div id="startScreen" class="visible">
    <img id="logoImg" class="logo-img" alt="SmashBerry" src="">
    <p class="subtitle">Slice fruits with your finger using your webcam!</p>
    <button class="btn" id="startBtn">Start Game</button>
    <p class="hint">Requires webcam access</p>
  </div>
  <div id="gameOverScreen">
    <div class="logo-text" style="font-size:3.5rem; color:#ff4444; text-shadow: 0 0 30px rgba(255,50,50,0.6);">GAME OVER</div>
    <div id="finalLabel">Final Score</div>
    <div id="finalScore">0</div>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="statSliced">0</div><div class="stat-lbl">Fruits Sliced</div></div>
      <div class="stat"><div class="stat-val" id="statCombo">0</div><div class="stat-lbl">Best Combo</div></div>
    </div>
    <button class="btn" id="restartBtn">Play Again</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>

/* ── Game State ── */
const FRUIT_TYPES = [
  { key: 'banana', color: '#ffdd44' },
  { key: 'cherry', color: '#ff3344' },
  { key: 'grape', color: '#9944cc' },
  { key: 'kiwi', color: '#66cc44' },
  { key: 'watermelon', color: '#ff5566' },
];

let gameState = 'menu';
let score = 0;
let lives = 5;
let combo = 0;
let comboTimer = 0;
let bestCombo = 0;
let totalSliced = 0;
let fruits = [];
let particles = [];
let sliceHalves = [];
let scorePopups = [];
let trailPoints = [];
let fingerPos = null;
let spawnTimer = 0;
let spawnInterval = 2.8;
let difficulty = 1;
let lastFrameTime = 0;
let cameraReady = false;
let mpHands = null;
let flashRed = 0;

const MAX_LIVES = 5;
const BASE_FRUIT_SIZE = 100;

/* ── MediaPipe Setup ── */
function initMediaPipe() {
  mpHands = new window.Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
  });
  mpHands.setOptions({
    maxNumHands: 1,
    modelComplexity: 0,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.4
  });
  mpHands.onResults(onHandResults);
}

function onHandResults(results) {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const lm = results.multiHandLandmarks[0][8];
    // Map camera center 50% to full screen width so edges are easier to reach
    const rawX = 1 - lm.x;
    const mappedX = Math.max(0, Math.min(1, (rawX - 0.25) / 0.5));
    fingerPos = { x: mappedX * W, y: lm.y * H };
  } else {
    fingerPos = null;
  }
}

async function startCamera() {
  // First get user media directly to ensure permission is granted
  const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1920, height: 1080, facingMode: 'user' } });
  video.srcObject = stream;
  await video.play();
  initMediaPipe();
  // Use a simple frame loop instead of Camera util to avoid infinite retry
  cameraReady = true;
  async function processFrame() {
    if (video.readyState >= 2) {
      await mpHands.send({ image: video });
    }
    requestAnimationFrame(processFrame);
  }
  processFrame();
}

/* ── Fruit Factory ── */
function createFruit() {
  const type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
  const size = BASE_FRUIT_SIZE + Math.random() * 25;
  const xMargin = 120;
  return {
    x: xMargin + Math.random() * (W - xMargin * 2),
    y: H + size,
    vx: (Math.random() - 0.5) * 2,
    vy: -(H * 0.009 + Math.random() * H * 0.003) * Math.min(difficulty, 1.8),
    size,
    type,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.06,
    wobble: Math.random() * Math.PI * 2,
    gravity: H * 0.00012,
    sliced: false
  };
}

/* ── Particles ── */
function createParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = 3 + Math.random() * 7;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 4 + Math.random() * 6,
      color,
      alpha: 1,
      life: 0.6 + Math.random() * 0.5,
      age: 0
    });
  }
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      size: 2 + Math.random() * 4,
      color: '#ffffff',
      alpha: 0.9,
      life: 0.3 + Math.random() * 0.3,
      age: 0
    });
  }
}

/* ── Slice Halves ── */
function createSliceHalves(fruit) {
  const angle = Math.random() * Math.PI;
  for (let side = -1; side <= 1; side += 2) {
    sliceHalves.push({
      x: fruit.x,
      y: fruit.y,
      vx: Math.cos(angle + Math.PI / 2) * side * 5 + fruit.vx,
      vy: fruit.vy * 0.4 - 1,
      size: fruit.size,
      type: fruit.type,
      rotation: fruit.rotation,
      rotSpeed: side * 0.15,
      side,
      clipAngle: angle,
      alpha: 1,
      gravity: H * 0.00018
    });
  }
}

/* ── Score Popup ── */
function addScorePopup(x, y, points, comboCount) {
  scorePopups.push({
    x, y,
    text: `+${points}`,
    combo: comboCount > 1 ? `${comboCount}x COMBO!` : '',
    alpha: 1,
    age: 0,
    life: 1.4,
    scale: 1.6,
    vy: -2.5
  });
}

/* ── Slice Logic ── */
function sliceFruit(fruit) {
  if (fruit.sliced) return;
  fruit.sliced = true;

  comboTimer = 1.2;
  combo++;
  if (combo > bestCombo) bestCombo = combo;
  const points = 10 * combo;
  score += points;
  totalSliced++;

  createParticles(fruit.x, fruit.y, fruit.type.color, 20);
  createSliceHalves(fruit);
  addScorePopup(fruit.x, fruit.y, points, combo);

  difficulty = 1 + totalSliced * 0.008;
  spawnInterval = Math.max(1.2, 2.8 - totalSliced * 0.012);
}

/* ── Collision Detection ── */
function trailIntersectsFruit(fruit) {
  if (trailPoints.length < 2) return false;
  const r = fruit.size * 0.55;
  const rSq = r * r;
  for (let i = trailPoints.length - 1; i >= Math.max(0, trailPoints.length - 10); i--) {
    const p = trailPoints[i];
    const dx = p.x - fruit.x;
    const dy = p.y - fruit.y;
    if (dx * dx + dy * dy < rSq) return true;
  }
  for (let i = trailPoints.length - 1; i >= Math.max(1, trailPoints.length - 8); i--) {
    const a = trailPoints[i - 1];
    const b = trailPoints[i];
    if (lineCircleIntersect(a.x, a.y, b.x, b.y, fruit.x, fruit.y, r)) return true;
  }
  return false;
}

function lineCircleIntersect(x1, y1, x2, y2, cx, cy, r) {
  const dx = x2 - x1, dy = y2 - y1;
  const fx = x1 - cx, fy = y1 - cy;
  const a = dx * dx + dy * dy;
  if (a < 0.001) return false;
  const b = 2 * (fx * dx + fy * dy);
  const c = fx * fx + fy * fy - r * r;
  let disc = b * b - 4 * a * c;
  if (disc < 0) return false;
  disc = Math.sqrt(disc);
  const t1 = (-b - disc) / (2 * a);
  const t2 = (-b + disc) / (2 * a);
  return (t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1) || (t1 < 0 && t2 > 1);
}

/* ═══════════════════════════════
   DRAWING
   ═══════════════════════════════ */

function drawTrail() {
  const pts = trailPoints;
  if (pts.length < 2) return;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.strokeStyle = 'rgba(255, 200, 50, 0.25)';
  ctx.lineWidth = 24;
  ctx.shadowColor = '#ffaa00';
  ctx.shadowBlur = 35;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  const grad = ctx.createLinearGradient(pts[0].x, pts[0].y, pts[pts.length - 1].x, pts[pts.length - 1].y);
  grad.addColorStop(0, 'rgba(255,255,255,0)');
  grad.addColorStop(0.4, 'rgba(255,220,100,0.7)');
  grad.addColorStop(1, 'rgba(255,255,255,1)');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 5;
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 14;
  ctx.stroke();
  ctx.restore();
}

function drawFruitImage(x, y, size, type, rotation, wobble) {
  const img = fruitImages[type.key];
  if (!img || !img.complete) return;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);
  const wobbleScale = 1 + Math.sin(wobble) * 0.06;
  ctx.scale(wobbleScale, 1 / wobbleScale);
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 15;
  ctx.shadowOffsetY = 6;
  const drawSize = size * 2;
  ctx.drawImage(img, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
  ctx.restore();
}

function drawFruit(fruit) {
  drawFruitImage(fruit.x, fruit.y, fruit.size, fruit.type, fruit.rotation, fruit.wobble);
}

function drawSliceHalf(half) {
  const img = fruitImages[half.type.key];
  if (!img || !img.complete) return;
  ctx.save();
  ctx.globalAlpha = Math.max(0, half.alpha);
  ctx.translate(half.x, half.y);
  ctx.rotate(half.rotation);
  // Clip to half
  ctx.beginPath();
  const cx = Math.cos(half.clipAngle);
  const cy = Math.sin(half.clipAngle);
  const s = half.size * 2.5;
  ctx.moveTo(-cy * s, cx * s);
  ctx.lineTo(cy * s, -cx * s);
  const nx = half.side * cx;
  const ny = half.side * cy;
  ctx.lineTo(cy * s + nx * s, -cx * s + ny * s);
  ctx.lineTo(-cy * s + nx * s, cx * s + ny * s);
  ctx.closePath();
  ctx.clip();
  const drawSize = half.size * 2;
  ctx.drawImage(img, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawFingerIndicator() {
  if (!fingerPos) return;
  ctx.save();
  ctx.beginPath();
  ctx.arc(fingerPos.x, fingerPos.y, 14, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(fingerPos.x, fingerPos.y, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 12;
  ctx.fill();
  ctx.restore();
}

function drawHUD() {
  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 40px "Fredoka", sans-serif';
  ctx.textAlign = 'left';
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 10;
  ctx.fillText(`${score}`, 24, 55);
  ctx.font = '15px "Fredoka", sans-serif';
  ctx.fillStyle = '#aaa';
  ctx.shadowBlur = 0;
  ctx.fillText('SCORE', 24, 76);

  ctx.textAlign = 'right';
  ctx.font = '36px serif';
  let livesStr = '';
  for (let i = 0; i < MAX_LIVES; i++) livesStr += i < lives ? '\u2764\uFE0F' : '\uD83D\uDDA4';
  ctx.fillText(livesStr, W - 20, 52);

  if (combo > 1 && comboTimer > 0) {
    const comboAlpha = Math.min(1, comboTimer * 2);
    const pulse = 1 + Math.sin(Date.now() * 0.01) * 0.06;
    ctx.textAlign = 'center';
    ctx.font = `bold ${Math.min(52, 28 + combo * 3)}px "Fredoka", sans-serif`;
    ctx.fillStyle = `rgba(255, 200, 0, ${comboAlpha})`;
    ctx.shadowColor = `rgba(255, 130, 0, ${comboAlpha * 0.8})`;
    ctx.shadowBlur = 25;
    ctx.save();
    ctx.translate(W / 2, 55);
    ctx.scale(pulse, pulse);
    ctx.fillText(`\uD83D\uDD25 ${combo}x COMBO`, 0, 0);
    ctx.restore();
  }
  ctx.restore();
}

function drawScorePopups() {
  scorePopups.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    const s = Math.min(1, p.scale);
    ctx.translate(p.x, p.y);
    ctx.scale(s, s);
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 34px "Fredoka", sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 8;
    ctx.fillText(p.text, 0, 0);
    if (p.combo) {
      ctx.font = 'bold 20px "Fredoka", sans-serif';
      ctx.fillStyle = '#ff6600';
      ctx.fillText(p.combo, 0, -38);
    }
    ctx.restore();
  });
}

/* ═══════════════════════════════
   UPDATE LOOP
   ═══════════════════════════════ */

function update(dt) {
  if (gameState !== 'playing') return;

  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnTimer = spawnInterval * (0.8 + Math.random() * 0.4);
    fruits.push(createFruit());
    if (Math.random() < 0.15 + difficulty * 0.03) {
      const delay = 200 + Math.random() * 400;
      setTimeout(() => { if (gameState === 'playing') fruits.push(createFruit()); }, delay);
    }
  }

  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) combo = 0;
  }

  if (fingerPos) {
    trailPoints.push({ x: fingerPos.x, y: fingerPos.y, age: 0 });
    if (trailPoints.length > 35) trailPoints.splice(0, trailPoints.length - 35);
  }
  trailPoints.forEach(p => p.age += dt);
  trailPoints = trailPoints.filter(p => p.age < 0.2);

  for (let i = fruits.length - 1; i >= 0; i--) {
    const f = fruits[i];
    f.x += f.vx;
    f.vy += f.gravity * 60 * dt;
    f.y += f.vy;
    f.rotation += f.rotSpeed;
    f.wobble += dt * 4;

    if (!f.sliced && trailIntersectsFruit(f) && trailPoints.length >= 2) {
      sliceFruit(f);
    }
    if (f.sliced) { fruits.splice(i, 1); continue; }
    if (f.y > H + f.size * 2 && f.vy > 0) {
      fruits.splice(i, 1);
      lives--;
      flashRed = 0.35;
      if (lives <= 0) { gameOver(); return; }
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.age += dt;
    p.alpha = 1 - p.age / p.life;
    if (p.age >= p.life) particles.splice(i, 1);
  }

  for (let i = sliceHalves.length - 1; i >= 0; i--) {
    const h = sliceHalves[i];
    h.x += h.vx;
    h.vy += h.gravity * 60 * dt;
    h.y += h.vy;
    h.rotation += h.rotSpeed;
    h.alpha -= dt * 0.6;
    if (h.alpha <= 0 || h.y > H + 150) sliceHalves.splice(i, 1);
  }

  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const p = scorePopups[i];
    p.y += p.vy;
    p.age += dt;
    p.alpha = 1 - p.age / p.life;
    p.scale = Math.max(1, p.scale - dt * 1.5);
    if (p.age >= p.life) scorePopups.splice(i, 1);
  }

  if (flashRed > 0) flashRed -= dt;
}

function render() {
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = '#0c0c0c';
  ctx.fillRect(0, 0, W, H);

  if (gameState !== 'playing') return;

  if (flashRed > 0) {
    ctx.fillStyle = `rgba(255, 0, 0, ${flashRed * 0.3})`;
    ctx.fillRect(0, 0, W, H);
  }

  sliceHalves.forEach(drawSliceHalf);
  fruits.forEach(drawFruit);
  drawParticles();
  drawTrail();
  drawFingerIndicator();
  drawScorePopups();
  drawHUD();
}

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastFrameTime) / 1000, 0.05);
  lastFrameTime = timestamp;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

/* ═══════════════════════════════
   GAME FLOW
   ═══════════════════════════════ */

function resetGame() {
  score = 0; lives = MAX_LIVES; combo = 0; comboTimer = 0;
  bestCombo = 0; totalSliced = 0; difficulty = 1;
  spawnInterval = 2.8; spawnTimer = 1.5; flashRed = 0;
  fruits = []; particles = []; sliceHalves = [];
  scorePopups = []; trailPoints = [];
}

function gameOver() {
  gameState = 'gameover';
  document.getElementById('finalScore').textContent = score;
  document.getElementById('statSliced').textContent = totalSliced;
  document.getElementById('statCombo').textContent = bestCombo;
  overlay.classList.add('active');
  startScreen.classList.remove('visible');
  gameOverScreen.classList.add('visible');
}

function startGame() {
  resetGame();
  gameState = 'playing';
  overlay.classList.remove('active');
  startScreen.classList.remove('visible');
  gameOverScreen.classList.remove('visible');
}

startBtn.addEventListener('click', async () => {
  startBtn.textContent = 'Loading camera...';
  startBtn.disabled = true;
  try {
    await startCamera();
    startGame();
  } catch (e) {
    console.error('Camera error:', e);
    startBtn.textContent = 'Camera access denied';
    setTimeout(() => {
      startBtn.textContent = 'Start Game';
      startBtn.disabled = false;
    }, 2000);
  }
});

restartBtn.addEventListener('click', startGame);

lastFrameTime = performance.now();
requestAnimationFrame(gameLoop);

}); // end DOMContentLoaded
</script>
